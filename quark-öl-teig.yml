name: Quark-Öl-Teig
portions: 4
ingredients:
  - 200 g; Quark
  - 2; Eier
  - 6 EL; Öl
  - 1 TL; Salz
  - 400 g; Mehl
  - 1 Pk.; Backpulver
steps:
  - Alle Zutaten in der Küchenmaschine gut durchkneten
  - Auf einem gefetteten Backblech ausrollen und mit einer Gabel den Teig einstechen
  - Für 20 - 30 Minten bei mittlerer Hitze (180 ºC) in den Backofen
