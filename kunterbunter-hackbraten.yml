name: Kunterbunter Hackbraten
image: img/kunterbunter-hackbraten.png
portions: 5
ingredients:
  - Öl
  - 150 g; Gouda
  - 150 g; Karotten
  - 150 g; Zucchini
  - 100 g; Paprika, bunt
  - 30 g; Paniermehl
  - 40 g; Wasser
  - 1; Zwiebel
  - 2; Knoblauchzehen
  - 75 g; Speckwürfel
  - 500 g; Hackfleisch
  - 1; Ei
  - 1 TL; Senf
  - 1 TL; Salz
  - 1 geh. TL; Paprika (edelsüß)
  - 3 EL; Petersilie TK
steps:
  - Backofen auf 200 ºC vorheizen. Eine Kastenform (25 x 11 x 10 cm) einfetten
  - Käse, Karotten, Zucchini & Paprika zerkleinern
  - Zwiebel & Knoblauch zerkleinern
  - Paniermehl und Wasser in einer Schüssel verrühren
  - Zwiebel, Knoblauch & Speckwürfel in Öl dünsten
  - Möhren zugeben und weiterdünsten
  - Alle Zutaten gut vermengen und in die Kastenform umfüllen
  - Hackbraten auf der 2. Schiene von unten 50 - 60 Minuten goldbraun backen.
