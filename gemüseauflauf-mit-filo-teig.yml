name: Gemüseauflauf mit Filo-Teig
image: img/gemueseauflauf-filo.jpg
portions: 4
ingredients:
  - 2; Lauch
  - 3; Paprika
  - 200 g; Champignons
  - 40 g; Pecorino
  - 600 ml; Milch
  - 2; Eier
  - 2 Zehen; Knoblauch
  - 1; Zwiebel
  - 250 g; Filoteig
  - 30 g; Mehl
  - 60 g; Butter
  - Olivenöl
  - Salz & Pfeffer
  - 1 TL; Muskatnuss
  - 2 TL; rote Paprikaflocken
  - 4; Nelken
steps:
  - Backofen auf 200 ºC (Ober- und Unterhitze) vorheizen
  - Pecorino reiben
  - Lauch waschen und in Ringe schneiden
  - Paprika waschen und in Stücke schneiden
  - Champignons waschen und in Stücke schneiden
  - Hälfte der Butter in Pfanne erhitzen, Gemüse braten bis es zusammenfällt
  - Gemüse mit Salz, Pfeffer und Paprikaflocken würzen
  - Hälfte der Butter in Pfanne erhitzen, Mehl zugeben und unter Rühren goldbraun braten. Mit Muskatnuss würzen
  - Hälfte der Milch in einen Topf geben, mit Knoblauch, halbierte Zwiebeln und Nelken zum Kochen bringen
  - Milch durch Sieb zur Butter-Mehl-Mischung geben und einrühren bis Mischung eindickt
  - Sauce & geriebenen Käse zum Gemüse geben
  - Eier, Hälfte der Milch und etwas Olivenöl mit Salz und Pfeffer mischen
  - Etwas Filoteig mit Olivenöl bestreichen und in eine ofenfeste Form legen
  - Einen Teil des Teigs in Streifen reißen, in Eimischung tunken und wellig in die Backform legen
  - Eine weitere Schicht Filoteig auflegen
  - Gemüsefüllung gleichmäßig darauf verteilen
  - Restliche Eimischung darauf leeren
  - Übrigen Filoteig auf der Füllung verteilen, mit Olivenöl bestrechen
  - Backen bis der Filoteig goldbraun ist (ca. 20 Minuten)
