name: Cremiges Mac and Cheese mit  Grünkohl
portions: 8
ingredients:
  - 150 g; Grünkohl
  - 1; Gemüsezwiebel
  - 150 g; Gouda
  - 720 ml; Vollmilch
  - 450 g; Conchiglie
  - 20 g; Panko-Paniermehl
  - 60 g; Weizenmehl Typ 550
  - 0.5 TL; Chiliflocken
  - 0.25 TL; Muskatnuss
  - 1 EL; Olivenöl
  - 60 g; Butter
  - Salz & Pfeffer
steps:
  - Pasta nach Packungsanleitung kochen
  - Grünkohl waschen und grob schütteln. Den Strunk entfernen und grob hacken
  - Grünkohl in einem großen Topf mit gesalzenem, kochenden Wasser geben.
    Nach 1-2 Minuten entnehmen, abtupfen und beiseite stellen.
  - Zwiebeln fein würfeln
  - Gouda reiben
  - Backofen auf Grillfunktion vorheizen
  - Milch in einen Topf gegeb und bei mittlerer Hitze vorsichtig erwärmen. Beiseite stellen.
  - Buttern in einem großen Topf bei mittlerer Hitze schmelzen, Zwiebeln darin 5 min anbraten.
  - Unter ständigen Rühren Mehl zufügen bis sich nach 2 min eine Mehlschwitze bildet.
  - Milch nach und nach mit dem Schneebesen einrühren und drauf achten, dass jede Zugabe jeweils
    vollständig eingearbeitet wird. Sobald die gesamte mich hinzugefügt wurde, die Hitze auf mittlere
    bis hohe Stufe erhöhen und köcheln lassen, bis die Masse eindickt. Häufig umrühren.
  - Wenn die Soße eingedickt ist, vom Herd nehmen und Käse, Chiliflocken, Muskatnuss, Salz und Pfeffer
    hinzufügen
  - Grünkohl und gekochte Nudeln unterheben
  - Alles in eine 35x25 cm große Auflaufform geben und mit Paniermehl bestreuen. Mit Olivenöl beträufeln
    und mit der gewünschten Menge Pfeffer garnieren. In den Ofen schieben und 3 - 5 min backen, bis das
    Paniermehl goldbraun ist.
