name: Gin Basil Smash
portions: 1
ingredients:
  - 6 cl; Gin
  - 3 cl; Zitronensaft
  - 2 cl; Zuckersirup
  - 1 Handvoll; Basilikumblätter
  - Eiswürfel
steps:
  - Basilikumblätter mit Zuckersirup im Shaker leicht anmuddeln
  - Gin und Zitronensaft dazugeben
  - Mit reichlich Eiswürfeln kräftig shaken
  - Doppelt durch ein Sieb in ein Glas mit Eiswürfeln abseihen
  - Mit einem Basilikumzweig garnieren
