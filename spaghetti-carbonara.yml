name: Spaghetti Carbonara
image: img/spaghetti-carbonara.jpg
portions: 4
ingredients:
  - 480 g; lange, dünne Pasta
  - 200 g; Pancetta, Guanciale oder roher italienischer Schinken
  - 4; Eier
  - 80 g; Parmesan oder Grana Padano, frisch gerieben
  - 80 g; Pecorino Romano, frisch gerieben
  - Olivenöl
  - Salz & Pfeffer
steps:
  - Den Speck bzw. Schinken grob würfeln und in etwas Olivenöl
    anschwitzen. Beiseitestellen.
  - Die Pasta in reichlich Salzwasser al dente kochen.
    Gegen Ende der Kochzeit 1–2 Espressotassen Kochwasser
    abschöpfen und beiseitestellen.
  - Eier mit Parmesan und Pecorino verquirlen, leicht salzen
    und großzügig schwarzen Pfeffer unterrühren.
  - Den Speck bzw. Schinken erneut erhitzen, das aufgefangene
    Kochwasser zugeben und kurz aufkochen lassen.
  - Die Pasta unterheben, dann die Eier-Käse-Mischung zugeben
    und unter ständigem Rühren leicht stocken lassen, bis die
    Sauce cremig ist und die Pasta umhüllt.

